/* ==================== CALENDAR VIEW ==================== */
function renderCalendar(app) {
  const v = el('div');
  v.appendChild(renderTopbar('ปฏิทิน'));
  const content = el('div', { class: 'view' });

  const y = state.calendarDate.getFullYear();
  const m = state.calendarDate.getMonth(); // 0-11
  const first = new Date(y, m, 1);
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const startDow = first.getDay();

  // Need current month data
  const ymPrefix = y + '-' + pad2(m + 1);

  const head = el('div', { class: 'cal-head' },
    el('button', { class: 'icon-btn', onclick: () => { state.calendarDate = new Date(y, m - 1, 1); state.calendarSelected = null; loadCalendarAndRender(); } }, '◀'),
    el('h3', {}, thaiMonth(y, m + 1)),
    el('button', { class: 'icon-btn', onclick: () => { state.calendarDate = new Date(y, m + 1, 1); state.calendarSelected = null; loadCalendarAndRender(); } }, '▶')
  );
  const card = el('div', { class: 'card' });
  card.appendChild(head);

  const grid = el('div', { class: 'cal-grid' });
  const dows = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  dows.forEach(d => grid.appendChild(el('div', { class: 'cal-dow' }, d)));

  const todayStr = todayISO();

  // Aggregate by date
  const byDate = {};
  state.transactions.filter(t => String(t.date).startsWith(ymPrefix)).forEach(t => {
    if (!byDate[t.date]) byDate[t.date] = { income: 0, expense: 0 };
    if (t.type === 'income') byDate[t.date].income += Number(t.amount);
    else byDate[t.date].expense += Number(t.amount);
  });

  for (let i = 0; i < startDow; i++) grid.appendChild(el('div', { class: 'cal-day empty' }));
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = y + '-' + pad2(m + 1) + '-' + pad2(d);
    const info = byDate[dateStr];
    const cls = 'cal-day'
      + (dateStr === todayStr ? ' today' : '')
      + (state.calendarSelected === dateStr ? ' selected' : '');
    const dayEl = el('div', {
      class: cls,
      onclick: () => { state.calendarSelected = dateStr; render(); }
    }, el('div', {}, String(d)));
    const dots = el('div', { class: 'dots' });
    if (info) {
      if (info.income > 0) dots.appendChild(el('div', { class: 'dot income' }));
      if (info.expense > 0) dots.appendChild(el('div', { class: 'dot expense' }));
    }
    dayEl.appendChild(dots);
    grid.appendChild(dayEl);
  }
  card.appendChild(grid);
  content.appendChild(card);

  // Selected date details
  if (state.calendarSelected) {
    const selTx = state.transactions.filter(t => t.date === state.calendarSelected);
    const dayCard = el('div', { class: 'card' });
    let dIn = 0, dOut = 0;
    selTx.forEach(t => { if (t.type === 'income') dIn += Number(t.amount); else dOut += Number(t.amount); });
    dayCard.appendChild(el('div', { class: 'sec-head', style: 'margin:0 0 8px;' },
      el('h3', {}, thaiDate(state.calendarSelected)),
      el('div', { class: 'row' },
        el('button', {
          class: 'btn btn-sm btn-ghost',
          onclick: () => showAddTxModal('expense', state.calendarSelected)
        }, '+ เพิ่ม')
      )
    ));
    dayCard.appendChild(el('div', { class: 'stat-row' },
      el('div', { class: 'stat income' }, el('div', { class: 'lbl' }, 'รายรับ'), el('div', { class: 'val' }, fmt(dIn))),
      el('div', { class: 'stat expense' }, el('div', { class: 'lbl' }, 'รายจ่าย'), el('div', { class: 'val' }, fmt(dOut))),
      el('div', { class: 'stat' }, el('div', { class: 'lbl' }, 'สุทธิ'), el('div', { class: 'val' }, fmt(dIn - dOut)))
    ));
    if (selTx.length > 0) {
      dayCard.appendChild(el('div', { class: 'mt-12' }, renderTxList(selTx)));
    } else {
      dayCard.appendChild(el('div', { class: 'empty' }, 'ไม่มีรายการในวันนี้'));
    }
    content.appendChild(dayCard);
  }

  v.appendChild(content);
  app.appendChild(v);
}

async function loadCalendarAndRender() {
  const d = state.calendarDate;
  const y = d.getFullYear(), m = d.getMonth() + 1;
  const from = y + '-' + pad2(m) + '-01';
  const to = y + '-' + pad2(m) + '-31';
  try {
    const tx = await api('listTransactions', { from, to });
    // merge into state.transactions (replace this month)
    state.transactions = (state.transactions || []).filter(t => !String(t.date).startsWith(from.slice(0,7))).concat(tx.transactions);
  } catch (e) { toast('โหลดไม่สำเร็จ', 'error'); }
  render();
}

/* ==================== SUMMARY VIEW ==================== */
function renderSummary(app) {
  const v = el('div');
  v.appendChild(renderTopbar('สรุปเงิน'));
  const content = el('div', { class: 'view' });

  // Toggle month/year
  const mode = state.summaryMode || 'month';
  const toggle = el('div', { class: 'type-toggle' });
  toggle.appendChild(el('button', {
    class: mode === 'month' ? 'active expense' : '',
    onclick: () => { state.summaryMode = 'month'; render(); }
  }, 'รายเดือน'));
  toggle.appendChild(el('button', {
    class: mode === 'year' ? 'active income' : '',
    onclick: () => { state.summaryMode = 'year'; render(); }
  }, 'รายปี'));
  content.appendChild(toggle);

  if (mode === 'year') renderYearSummary(content);
  else renderMonthSummary(content);

  v.appendChild(content);
  app.appendChild(v);
}

async function renderMonthSummary(content) {
  const y = state.summaryYear, m = state.summaryMonth;
  const cacheKey = 'm-' + y + '-' + m;
  const card = el('div', { class: 'card mt-12' });
  card.appendChild(el('div', { class: 'cal-head' },
    el('button', { class: 'icon-btn', onclick: () => {
      let nm = m - 1, ny = y; if (nm < 1) { nm = 12; ny = y - 1; }
      state.summaryMonth = nm; state.summaryYear = ny; render();
    } }, '◀'),
    el('h3', {}, thaiMonth(y, m)),
    el('button', { class: 'icon-btn', onclick: () => {
      let nm = m + 1, ny = y; if (nm > 12) { nm = 1; ny = y + 1; }
      state.summaryMonth = nm; state.summaryYear = ny; render();
    } }, '▶')
  ));
  const body = el('div');
  card.appendChild(body);
  content.appendChild(card);

  function draw(r) {
    body.innerHTML = '';
    body.appendChild(el('div', { class: 'stat-row' },
      el('div', { class: 'stat income' }, el('div', { class: 'lbl' }, 'รายรับ'), el('div', { class: 'val' }, fmt(r.income))),
      el('div', { class: 'stat expense' }, el('div', { class: 'lbl' }, 'รายจ่าย'), el('div', { class: 'val' }, fmt(r.expense))),
      el('div', { class: 'stat' }, el('div', { class: 'lbl' }, 'คงเหลือ'), el('div', { class: 'val' }, fmt(r.balance)))
    ));
    const expenses = r.byCategory.filter(x => x.type === 'expense').sort((a, b) => b.total - a.total);
    const incomes = r.byCategory.filter(x => x.type === 'income').sort((a, b) => b.total - a.total);
    if (expenses.length > 0) {
      body.appendChild(el('div', { class: 'sec-head', style: 'margin:18px 4px 8px;' }, el('h3', {}, 'รายจ่ายแยกหมวด')));
      body.appendChild(renderCategoryBreakdown(expenses, r.expense, 'expense', y, m));
    }
    if (incomes.length > 0) {
      body.appendChild(el('div', { class: 'sec-head', style: 'margin:18px 4px 8px;' }, el('h3', {}, 'รายรับแยกหมวด')));
      body.appendChild(renderCategoryBreakdown(incomes, r.income, 'income', y, m));
    }
    if (r.count === 0) {
      body.appendChild(el('div', { class: 'empty' }, el('div', { class: 'emo' }, '📊'), 'ไม่มีรายการในเดือนนี้'));
    }
  }

  const cached = state.cache.summaries[cacheKey];
  if (cached) draw(cached);
  else body.appendChild(el('div', { class: 'center', style: 'padding:20px;' }, el('div', { class: 'loader' })));

  try {
    const r = await api('summary', { year: y, month: m });
    state.cache.summaries[cacheKey] = r;
    if (state.currentView === 'summary' && state.summaryYear === y && state.summaryMonth === m) draw(r);
  } catch (e) {
    if (!cached) { body.innerHTML = ''; body.appendChild(el('div', { class: 'empty' }, 'โหลดไม่สำเร็จ')); }
  }
}

function renderCategoryBreakdown(items, total, type, y, m) {
  const list = el('div');
  items.forEach(it => {
    const cat = catLookup(it.category, type);
    const pct = total > 0 ? (it.total / total) * 100 : 0;
    list.appendChild(el('div', {
      style: 'padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;',
      onclick: () => showCategoryDetail(it.category, type, y, m)
    },
      el('div', { class: 'row', style: 'justify-content:space-between;' },
        el('div', {}, cat.emoji + ' ' + cat.name + ' ', el('span', { class: 'small muted' }, '(' + it.count + ')')),
        el('div', { style: 'font-weight:600;' }, fmt(it.total))
      ),
      el('div', { class: 'progress mt-8' },
        el('div', { class: 'progress-fill ' + (type === 'income' ? 'income' : ''), style: 'width:' + pct.toFixed(1) + '%;' })
      ),
      el('div', { class: 'small muted mt-8' }, pct.toFixed(1) + '% • กดดูรายการ')
    ));
  });
  return list;
}

async function showCategoryDetail(category, type, y, m) {
  const cat = catLookup(category, type);
  openModal(cat.emoji + ' ' + cat.name + ' — ' + thaiMonth(y, m), async (c) => {
    c.appendChild(el('div', { class: 'center' }, el('div', { class: 'loader' })));
    const from = y + '-' + pad2(m) + '-01';
    const to = y + '-' + pad2(m) + '-31';
    try {
      const r = await api('listTransactions', { from, to });
      const filtered = r.transactions.filter(t => t.type === type && t.category === category);
      c.innerHTML = '';
      if (filtered.length === 0) {
        c.appendChild(el('div', { class: 'empty' }, 'ไม่มีรายการ'));
        return;
      }
      const total = filtered.reduce((s, t) => s + Number(t.amount), 0);
      c.appendChild(el('div', { class: 'stat-row' },
        el('div', { class: 'stat' }, el('div', { class: 'lbl' }, 'ยอดรวม'), el('div', { class: 'val' }, fmt(total))),
        el('div', { class: 'stat' }, el('div', { class: 'lbl' }, 'จำนวน'), el('div', { class: 'val' }, filtered.length)),
        el('div', { class: 'stat' }, el('div', { class: 'lbl' }, 'เฉลี่ย'), el('div', { class: 'val' }, fmt(total / filtered.length)))
      ));
      c.appendChild(el('div', { class: 'mt-16' }, renderTxList(filtered)));
    } catch (e) { c.innerHTML = ''; c.appendChild(el('div', { class: 'empty' }, 'โหลดไม่สำเร็จ')); }
  });
}

async function renderYearSummary(content) {
  const y = state.summaryYear;
  const cacheKey = 'y-' + y;
  const card = el('div', { class: 'card mt-12' });
  card.appendChild(el('div', { class: 'cal-head' },
    el('button', { class: 'icon-btn', onclick: () => { state.summaryYear = y - 1; render(); } }, '◀'),
    el('h3', {}, 'ปี ' + (y + 543)),
    el('button', { class: 'icon-btn', onclick: () => { state.summaryYear = y + 1; render(); } }, '▶')
  ));
  const body = el('div');
  card.appendChild(body);
  content.appendChild(card);

  function draw(r) {
    body.innerHTML = '';
    body.appendChild(el('div', { class: 'stat-row' },
      el('div', { class: 'stat income' }, el('div', { class: 'lbl' }, 'รายรับทั้งปี'), el('div', { class: 'val' }, fmt(r.totalIncome))),
      el('div', { class: 'stat expense' }, el('div', { class: 'lbl' }, 'รายจ่ายทั้งปี'), el('div', { class: 'val' }, fmt(r.totalExpense))),
      el('div', { class: 'stat' }, el('div', { class: 'lbl' }, 'คงเหลือ'), el('div', { class: 'val' }, fmt(r.balance)))
    ));

    // bar chart
    const chart = el('div', { class: 'mt-16', style: 'display:flex;align-items:flex-end;gap:4px;height:120px;' });
    const maxVal = Math.max(1, ...r.months.map(mm => Math.max(mm.income, mm.expense)));
    const thaiMon = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    r.months.forEach(mm => {
      const col = el('div', { style: 'flex:1;display:flex;flex-direction:column;align-items:center;' });
      const bars = el('div', { style: 'display:flex;gap:1px;align-items:flex-end;height:100px;width:100%;' },
        el('div', { style: 'flex:1;background:var(--income);height:' + (mm.income / maxVal * 100) + '%;border-radius:3px 3px 0 0;' }),
        el('div', { style: 'flex:1;background:var(--expense);height:' + (mm.expense / maxVal * 100) + '%;border-radius:3px 3px 0 0;' })
      );
      col.appendChild(bars);
      col.appendChild(el('div', { class: 'small muted', style: 'margin-top:4px;' }, thaiMon[mm.month - 1]));
      chart.appendChild(col);
    });
    body.appendChild(chart);

    // month list
    body.appendChild(el('div', { class: 'sec-head', style: 'margin:18px 4px 8px;' }, el('h3', {}, 'ดูรายเดือน')));
    const list = el('div');
    r.months.forEach(mm => {
      list.appendChild(el('div', {
        style: 'padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;',
        onclick: () => { state.summaryMode = 'month'; state.summaryMonth = mm.month; state.summaryYear = y; render(); }
      },
        el('div', { class: 'row', style: 'justify-content:space-between;' },
          el('div', { style: 'font-weight:600;' }, thaiMon[mm.month - 1]),
          el('div', { class: 'small' },
            el('span', { style: 'color:var(--income);' }, '+' + fmt(mm.income)),
            ' / ',
            el('span', { style: 'color:var(--expense);' }, '-' + fmt(mm.expense))
          )
        ),
        el('div', { class: 'small muted mt-8' }, 'สุทธิ ' + fmt(mm.balance))
      ));
    });
    body.appendChild(list);
  }

  const cached = state.cache.summaries[cacheKey];
  if (cached) draw(cached);
  else body.appendChild(el('div', { class: 'center', style: 'padding:20px;' }, el('div', { class: 'loader' })));

  try {
    const r = await api('summaryYear', { year: y });
    state.cache.summaries[cacheKey] = r;
    if (state.currentView === 'summary' && state.summaryYear === y && state.summaryMode === 'year') draw(r);
  } catch (e) {
    if (!cached) { body.innerHTML = ''; body.appendChild(el('div', { class: 'empty' }, 'โหลดไม่สำเร็จ')); }
  }
}

/* ==================== JARS VIEW ==================== */
async function renderJars(app) {
  const v = el('div');
  v.appendChild(renderTopbar('กระปุกออม', 'ออมเงินร่วมกัน', [
    el('button', { class: 'icon-btn', onclick: () => showCreateJarModal() }, '➕')
  ]));
  const content = el('div', { class: 'view' });
  v.appendChild(content);
  app.appendChild(v);

  function draw(jars) {
    content.innerHTML = '';
    if (jars.length === 0) {
      content.appendChild(el('div', { class: 'empty' },
        el('div', { class: 'emo' }, '🐷'),
        el('div', {}, 'ยังไม่มีกระปุก'),
        el('div', { class: 'small mt-8' }, 'สร้างกระปุกใหม่เพื่อเริ่มออม'),
        el('button', { class: 'btn btn-primary mt-16', onclick: () => showCreateJarModal() }, '+ สร้างกระปุก')
      ));
      return;
    }
    jars.forEach(j => content.appendChild(renderJarCard(j)));
  }

  const cached = state.cache.jarsList;
  if (cached) draw(cached);
  else content.appendChild(el('div', { class: 'center' }, el('div', { class: 'loader' })));

  try {
    const r = await api('listJars');
    state.cache.jarsList = r.jars;
    if (state.currentView === 'jars') draw(r.jars);
  } catch (e) {
    if (!cached) { content.innerHTML = ''; content.appendChild(el('div', { class: 'empty' }, 'โหลดไม่สำเร็จ')); }
  }
}

function renderJarCard(j) {
  const goal = Number(j.goal) || 0;
  const pct = goal > 0 ? Math.min(100, (j.total / goal) * 100) : 0;
  return el('div', { class: 'jar-card', onclick: () => showJarDetail(j.jarId) },
    el('div', { class: 'jar-head' },
      el('div', { class: 'jar-name' }, '🐷 ' + j.name),
      el('div', { class: 'jar-total' }, fmt(j.total))
    ),
    goal > 0 ? el('div', {},
      el('div', { class: 'progress' },
        el('div', { class: 'progress-fill income', style: 'width:' + pct + '%;' })
      ),
      el('div', { class: 'jar-meta' }, 'เป้าหมาย ' + fmt(goal) + ' • ' + pct.toFixed(1) + '%')
    ) : el('div', { class: 'jar-meta' }, 'ไม่ตั้งเป้าหมาย'),
    el('div', { class: 'jar-meta' }, '👥 ' + (j.members || []).map(m => m.name).join(', '))
  );
}

function showCreateJarModal() {
  openModal('สร้างกระปุกใหม่', async (c) => {
    const nameInp = el('input', { placeholder: 'ชื่อกระปุก เช่น ทริปญี่ปุ่น' });
    const goalInp = el('input', { type: 'tel', inputmode: 'decimal', placeholder: 'เป้าหมาย (บาท) — ไม่ตั้งก็ได้' });
    const dlInp = el('input', { type: 'date' });
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'ชื่อกระปุก'), nameInp));
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'เป้าหมาย'), goalInp));
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'วันที่ถึงเป้า (ไม่บังคับ)'), dlInp));

    // Members
    c.appendChild(el('label', {}, 'สมาชิก'));
    const memberBox = el('div', { class: 'chip-row' });
    const selected = new Set([state.user.userId]);
    try {
      const u = await api('listUsers');
      u.users.forEach(usr => {
        const chip = el('button', {
          class: 'chip' + (selected.has(usr.userId) ? ' active' : '') + (usr.userId === state.user.userId ? ' active' : ''),
          onclick: () => {
            if (usr.userId === state.user.userId) return;
            if (selected.has(usr.userId)) selected.delete(usr.userId);
            else selected.add(usr.userId);
            chip.classList.toggle('active');
          }
        }, usr.name + (usr.userId === state.user.userId ? ' (คุณ)' : ''));
        memberBox.appendChild(chip);
      });
    } catch (e) {}
    c.appendChild(memberBox);

    c.appendChild(el('button', {
      class: 'btn btn-primary btn-block mt-16',
      onclick: async () => {
        const name = nameInp.value.trim();
        if (!name) return toast('ใส่ชื่อกระปุก', 'error');
        try {
          const memberIds = [...selected].filter(id => id !== state.user.userId);
          await api('createJar', {
            name,
            goal: Number(goalInp.value) || 0,
            deadline: dlInp.value || '',
            memberIds
          });
          closeModal(); toast('สร้างกระปุกแล้ว', 'success'); render();
        } catch (e) { toast(e.message, 'error'); }
      }
    }, 'สร้างกระปุก'));
  });
}

async function showJarDetail(jarId) {
  openModal('กระปุกออม', async (c) => {
    c.appendChild(el('div', { class: 'center' }, el('div', { class: 'loader' })));
    try {
      const r = await api('getJar', { jarId });
      c.innerHTML = '';
      const j = r.jar;
      const goal = Number(j.goal) || 0;
      const pct = goal > 0 ? Math.min(100, (j.total / goal) * 100) : 0;

      const header = el('div', { class: 'center', style: 'padding-bottom:14px;' },
        el('div', { style: 'font-size:40px;' }, '🐷'),
        el('div', { style: 'font-weight:700;font-size:18px;margin-top:6px;' }, j.name),
        el('div', { style: 'font-size:28px;font-weight:700;color:var(--primary);margin-top:8px;' }, fmt(j.total) + ' บาท'),
        goal > 0 ? el('div', { class: 'small muted' }, 'จาก ' + fmt(goal) + ' (' + pct.toFixed(1) + '%)') : null
      );
      c.appendChild(header);
      if (goal > 0) c.appendChild(el('div', { class: 'progress' }, el('div', { class: 'progress-fill income', style: 'width:' + pct + '%;' })));

      if (j.deadline) {
        const daysLeft = Math.ceil((fromISO(j.deadline) - new Date()) / 86400000);
        c.appendChild(el('div', { class: 'small muted center mt-8' },
          daysLeft > 0 ? '⏳ เหลืออีก ' + daysLeft + ' วัน ถึงวันที่ ' + thaiDate(j.deadline)
          : (daysLeft === 0 ? '⏰ ถึงวันเป้าหมายแล้ว' : '❌ ผ่านวันเป้าหมายมา ' + (-daysLeft) + ' วัน')
        ));
        if (goal > 0 && daysLeft > 0 && j.total < goal) {
          const need = (goal - j.total) / daysLeft * 30;
          c.appendChild(el('div', { class: 'small muted center' }, 'ต้องออมเดือนละประมาณ ' + fmt(need) + ' บาท'));
        }
      }

      // Actions
      c.appendChild(el('div', { class: 'action-row mt-16' },
        el('button', {
          class: 'action-btn income', onclick: () => { closeModal(); setTimeout(() => showJarTxModal(j, 'deposit'), 250); }
        }, el('div', { class: 'big' }, '➕'), 'ฝากเงิน'),
        el('button', {
          class: 'action-btn expense', onclick: () => { closeModal(); setTimeout(() => showJarTxModal(j, 'withdraw'), 250); }
        }, el('div', { class: 'big' }, '➖'), 'ถอนเงิน')
      ));

      // Members
      c.appendChild(el('div', { class: 'sec-head', style: 'margin:18px 4px 8px;' }, el('h3', {}, 'สมาชิก (' + j.members.length + ')')));
      j.members.forEach(m => {
        c.appendChild(el('div', { class: 'row', style: 'padding:8px 0;border-bottom:1px solid var(--border);' },
          el('div', { class: 'user-avatar', style: 'width:32px;height:32px;font-size:14px;' }, m.name.slice(0, 1).toUpperCase()),
          el('div', { style: 'flex:1;' }, m.name + (m.userId === state.user.userId ? ' (คุณ)' : '')),
          el('div', { class: 'small muted' }, 'ฝาก ' + fmt(m.contribution))
        ));
      });

      c.appendChild(el('button', {
        class: 'btn btn-ghost btn-block mt-16',
        onclick: () => showEditJarModal(j)
      }, '⚙️ จัดการกระปุก'));

      // Transactions
      c.appendChild(el('div', { class: 'sec-head', style: 'margin:18px 4px 8px;' }, el('h3', {}, 'ประวัติ')));
      if (j.transactions.length === 0) {
        c.appendChild(el('div', { class: 'empty' }, 'ยังไม่มีรายการ'));
      } else {
        j.transactions.forEach(t => {
          c.appendChild(el('div', {
            class: 'tx-item',
            onclick: () => {
              if (t.userId !== state.user.userId && !state.user.isAdmin) return;
              if (!confirm('ลบรายการนี้?')) return;
              api('deleteJarTx', { jarId, jtxId: t.jtxId }).then(() => {
                closeModal(); toast('ลบแล้ว', 'success'); setTimeout(() => showJarDetail(jarId), 250);
              }).catch(e => toast(e.message, 'error'));
            }
          },
            el('div', { class: 'tx-icon' }, t.type === 'deposit' ? '⬇️' : '⬆️'),
            el('div', { class: 'tx-body' },
              el('div', { class: 'tx-title' }, t.userName + (t.type === 'deposit' ? ' ฝาก' : ' ถอน')),
              el('div', { class: 'tx-note' }, thaiDate(t.date) + (t.note ? ' • ' + t.note : ''))
            ),
            el('div', { class: 'tx-amt ' + (t.type === 'deposit' ? 'income' : 'expense') },
              (t.type === 'deposit' ? '+' : '-') + fmt(t.amount))
          ));
        });
      }
    } catch (e) {
      c.innerHTML = '';
      c.appendChild(el('div', { class: 'empty' }, 'โหลดไม่สำเร็จ: ' + e.message));
    }
  });
}

function showJarTxModal(jar, type) {
  openModal(type === 'deposit' ? 'ฝากเข้ากระปุก' : 'ถอนจากกระปุก', (c) => {
    let amount = '', note = '', date = todayISO();
    let linkToPersonal = true;

    const amtInp = el('input', { type: 'tel', inputmode: 'decimal', class: 'amount-input', placeholder: '0' });
    amtInp.addEventListener('input', () => { amount = amtInp.value; });
    c.appendChild(el('div', { class: 'field' }, el('label', { class: 'center' }, 'จำนวน (บาท)'), amtInp));

    const dateInp = el('input', { type: 'date', value: date });
    dateInp.addEventListener('input', () => { date = dateInp.value; });
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'วันที่'), dateInp));

    const noteInp = el('input', { placeholder: 'หมายเหตุ' });
    noteInp.addEventListener('input', () => { note = noteInp.value; });
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'หมายเหตุ'), noteInp));

    const cb = el('input', { type: 'checkbox', checked: 'checked', style: 'width:auto;margin-right:8px;' });
    cb.addEventListener('change', () => { linkToPersonal = cb.checked; });
    c.appendChild(el('label', { style: 'display:flex;align-items:center;background:var(--surface-2);padding:10px;border-radius:10px;cursor:pointer;' },
      cb,
      el('div', { class: 'small' }, 'หัก' + (type === 'deposit' ? 'จาก' : 'เข้า') + 'กระเป๋าส่วนตัวด้วย (แนะนำ)')
    ));

    c.appendChild(el('button', {
      class: 'btn btn-primary btn-block mt-16',
      onclick: async () => {
        const amt = Number(amount);
        if (!isFinite(amt) || amt <= 0) return toast('ใส่จำนวนเงิน', 'error');
        try {
          await api(type === 'deposit' ? 'depositJar' : 'withdrawJar', {
            jarId: jar.jarId, amount: amt, note, date, linkToPersonal
          });
          closeModal(); toast('บันทึกแล้ว', 'success');
          await reloadMonth(); setTimeout(() => showJarDetail(jar.jarId), 250);
        } catch (e) { toast(e.message, 'error'); }
      }
    }, 'บันทึก'));
  });
}

function showEditJarModal(jar) {
  openModal('จัดการกระปุก', (c) => {
    const nameInp = el('input', { value: jar.name });
    const goalInp = el('input', { type: 'tel', inputmode: 'decimal', value: jar.goal || '' });
    const dlInp = el('input', { type: 'date', value: jar.deadline || '' });
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'ชื่อกระปุก'), nameInp));
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'เป้าหมาย'), goalInp));
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'วันที่ถึงเป้า'), dlInp));

    // Manage members
    c.appendChild(el('label', {}, 'สมาชิกปัจจุบัน'));
    const memberList = el('div', { class: 'chip-row mt-8' });
    jar.members.forEach(m => {
      const chip = el('div', { class: 'chip active' }, m.name);
      if (m.userId !== state.user.userId && (jar.createdBy === state.user.userId || state.user.isAdmin)) {
        chip.innerHTML += ' ✕';
        chip.style.cursor = 'pointer';
        chip.addEventListener('click', async () => {
          if (!confirm('ลบ ' + m.name + ' ออกจากกระปุก?')) return;
          try {
            await api('leaveJar', { jarId: jar.jarId, targetUserId: m.userId });
            closeModal(); setTimeout(() => showJarDetail(jar.jarId), 250);
          } catch (e) { toast(e.message, 'error'); }
        });
      }
      memberList.appendChild(chip);
    });
    c.appendChild(memberList);

    // Add member
    c.appendChild(el('label', { class: 'mt-12' }, 'เพิ่มสมาชิก'));
    const addBox = el('div', { class: 'chip-row mt-8' });
    c.appendChild(addBox);
    (async () => {
      try {
        const u = await api('listUsers');
        const existingIds = jar.members.map(m => m.userId);
        u.users.filter(usr => !existingIds.includes(usr.userId)).forEach(usr => {
          addBox.appendChild(el('button', {
            class: 'chip',
            onclick: async () => {
              try {
                await api('joinJar', { jarId: jar.jarId, targetUserId: usr.userId });
                closeModal(); setTimeout(() => showJarDetail(jar.jarId), 250);
              } catch (e) { toast(e.message, 'error'); }
            }
          }, '+ ' + usr.name));
        });
      } catch (e) {}
    })();

    c.appendChild(el('button', {
      class: 'btn btn-primary btn-block mt-16',
      onclick: async () => {
        try {
          await api('updateJar', {
            jarId: jar.jarId,
            name: nameInp.value.trim(),
            goal: Number(goalInp.value) || 0,
            deadline: dlInp.value || ''
          });
          closeModal(); toast('บันทึกแล้ว', 'success'); setTimeout(() => showJarDetail(jar.jarId), 250);
        } catch (e) { toast(e.message, 'error'); }
      }
    }, 'บันทึก'));

    if (jar.createdBy === state.user.userId || state.user.isAdmin) {
      c.appendChild(el('button', {
        class: 'btn btn-danger btn-block mt-8',
        onclick: async () => {
          if (!confirm('ลบกระปุกนี้? ข้อมูลทั้งหมดจะหายไป')) return;
          try {
            await api('deleteJar', { jarId: jar.jarId });
            closeModal(); toast('ลบกระปุกแล้ว', 'success'); render();
          } catch (e) { toast(e.message, 'error'); }
        }
      }, '🗑 ลบกระปุก'));
    }
  });
}

/* ==================== SETTINGS VIEW ==================== */
function renderSettings(app) {
  const v = el('div');
  v.appendChild(renderTopbar('ตั้งค่า'));
  const content = el('div', { class: 'view' });

  // Profile
  const profile = el('div', { class: 'card' });
  profile.appendChild(el('div', { class: 'row' },
    el('div', { class: 'user-avatar' }, state.user.name.slice(0, 1).toUpperCase()),
    el('div', { style: 'flex:1;' },
      el('div', { style: 'font-weight:600;' }, state.user.name),
      el('div', { class: 'small muted' }, state.user.isAdmin ? '⭐ Admin' : 'ผู้ใช้')
    ),
    el('button', { class: 'btn btn-sm btn-ghost', onclick: () => showProfileModal() }, '✏️')
  ));
  content.appendChild(profile);

  // Menu items
  const menu = [
    { ic: '🔄', lbl: 'รายการประจำ (Fixed Cost)', onclick: showFixedCostsModal },
    { ic: '🏷️', lbl: 'หมวดหมู่', onclick: showCategoriesModal },
    { ic: '🎯', lbl: 'งบประมาณ', onclick: showBudgetModal },
    { ic: state.theme === 'dark' ? '☀️' : '🌙', lbl: state.theme === 'dark' ? 'โหมดสว่าง' : 'โหมดมืด', onclick: toggleTheme },
    { ic: '📤', lbl: 'Export CSV', onclick: exportCsvFile },
  ];
  if (state.user.isAdmin) {
    menu.push({ ic: '👥', lbl: 'จัดการผู้ใช้ (Admin)', onclick: showUserManagement });
  }
  menu.push({ ic: '🚪', lbl: 'ออกจากระบบ', onclick: () => doLogout() });

  const card = el('div', { class: 'card' });
  menu.forEach((m, i) => {
    card.appendChild(el('div', {
      class: 'row',
      style: 'padding:14px 4px;' + (i < menu.length - 1 ? 'border-bottom:1px solid var(--border);' : '') + 'cursor:pointer;',
      onclick: m.onclick
    },
      el('div', { style: 'font-size:22px;width:32px;text-align:center;' }, m.ic),
      el('div', { style: 'flex:1;' }, m.lbl),
      el('div', { class: 'muted' }, '›')
    ));
  });
  content.appendChild(card);

  // Install PWA hint
  content.appendChild(el('div', { class: 'small muted center mt-16' },
    '💡 เปิดในมือถือ → กดเพิ่มไปหน้าจอหลัก เพื่อใช้เหมือนแอปจริง'
  ));

  v.appendChild(content);
  app.appendChild(v);
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', state.theme);
  render();
}

function showProfileModal() {
  openModal('แก้ไขโปรไฟล์', (c) => {
    const nameInp = el('input', { value: state.user.name });
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'ชื่อ'), nameInp));
    c.appendChild(el('button', {
      class: 'btn btn-primary btn-block',
      onclick: async () => {
        const name = nameInp.value.trim();
        if (!name) return toast('ใส่ชื่อ', 'error');
        try {
          await api('changeName', { name });
          state.user.name = name;
          localStorage.setItem('user', JSON.stringify(state.user));
          toast('แก้ไขแล้ว', 'success'); closeModal(); render();
        } catch (e) { toast(e.message, 'error'); }
      }

    const newInp = el('input', { type: 'password', inputmode: 'numeric', placeholder: 'PIN ใหม่ (4-6 หลัก)' });

    c.appendChild(el('div', { class: 'field' }, newInp));

      class: 'btn btn-ghost btn-block',
      onclick: async () => {
        try {
          await api('changePin', { oldPin: oldInp.value, newPin: newInp.value });

}

function showFixedCostsModal() {
  openModal('รายการประจำ', (c) => {
    function draw() {
      c.innerHTML = '';
      const fcs = state.fixedCosts;
      if (fcs.length === 0) {
        c.appendChild(el('div', { class: 'empty' },
          el('div', { class: 'emo' }, '🔄'),
          el('div', {}, 'ยังไม่มีรายการประจำ'),
          el('div', { class: 'small muted' }, 'เช่น ค่าเช่า ค่าน้ำ ค่าไฟ เงินเดือน')
        ));
      } else {
        ['income', 'expense'].forEach(type => {
          const items = fcs.filter(f => f.type === type);
          if (items.length === 0) return;
          c.appendChild(el('div', { class: 'sec-head' }, el('h3', {}, type === 'income' ? 'รายรับประจำ' : 'รายจ่ายประจำ')));
          items.forEach(f => {
            const cat = catLookup(f.category, type);
            c.appendChild(el('div', {
              class: 'row',
              style: 'padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;',
              onclick: () => { closeModal(); setTimeout(() => showEditFixedCostModal(f), 250); }
            },
              el('div', { style: 'font-size:24px;' }, cat.emoji),
              el('div', { style: 'flex:1;' },
                el('div', { style: 'font-weight:600;' }, f.name || cat.name),
                el('div', { class: 'small muted' }, 'ทุกวันที่ ' + f.dayOfMonth + (f.active === false ? ' • หยุดใช้' : ''))
              ),
              el('div', { style: 'font-weight:700;color:var(--' + type + ');' },
                (type === 'income' ? '+' : '-') + fmt(f.amount))
            ));
          });
        });
      }
      c.appendChild(el('button', {
        class: 'btn btn-primary btn-block mt-16',
        onclick: () => { closeModal(); setTimeout(() => showEditFixedCostModal(null), 250); }
      }, '+ เพิ่มรายการประจำ'));
    }
    draw();
  });
}

function showEditFixedCostModal(fc) {
  openModal(fc ? 'แก้ไขรายการประจำ' : 'เพิ่มรายการประจำ', (c) => {
    let type = fc ? fc.type : 'expense';
    let name = fc ? fc.name : '';
    let category = fc ? fc.category : null;
    let amount = fc ? String(fc.amount) : '';
    let day = fc ? String(fc.dayOfMonth) : '1';
    let active = fc ? (fc.active !== false && fc.active !== 'FALSE' && fc.active !== 'false') : true;

    const tToggle = el('div', { class: 'type-toggle' });
    const bE = el('button', { class: type === 'expense' ? 'active expense' : '' }, 'รายจ่าย');
    const bI = el('button', { class: type === 'income' ? 'active income' : '' }, 'รายรับ');
    bE.onclick = () => { type = 'expense'; bE.className = 'active expense'; bI.className = ''; drawCats(); };
    bI.onclick = () => { type = 'income'; bI.className = 'active income'; bE.className = ''; drawCats(); };
    tToggle.appendChild(bE); tToggle.appendChild(bI);
    c.appendChild(tToggle);

    const nameInp = el('input', { placeholder: 'ชื่อ เช่น ค่าเช่าคอนโด', value: name });
    nameInp.addEventListener('input', () => { name = nameInp.value; });
    c.appendChild(el('div', { class: 'field mt-12' }, el('label', {}, 'ชื่อ'), nameInp));

    const amtInp = el('input', { type: 'tel', inputmode: 'decimal', placeholder: '0', value: amount });
    amtInp.addEventListener('input', () => { amount = amtInp.value; });
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'จำนวน'), amtInp));

    const catWrap = el('div', { class: 'field' });
    catWrap.appendChild(el('label', {}, 'หมวดหมู่'));
    const catGrid = el('div', { class: 'cat-grid' });
    catWrap.appendChild(catGrid);
    function drawCats() {
      catGrid.innerHTML = '';
      state.categories.filter(x => x.type === type).forEach(cat => {
        catGrid.appendChild(el('button', {
          class: 'cat-btn' + (category === cat.name ? ' selected' : ''),
          onclick: () => { category = cat.name; drawCats(); }
        }, el('div', { class: 'emo' }, cat.emoji), el('div', {}, cat.name)));
      });
    }
    drawCats();
    c.appendChild(catWrap);

    const daySel = el('select');
    for (let i = 1; i <= 31; i++) {
      const opt = el('option', { value: String(i) }, 'วันที่ ' + i);
      if (String(i) === day) opt.selected = true;
      daySel.appendChild(opt);
    }
    daySel.addEventListener('change', () => { day = daySel.value; });
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'บันทึกทุกวันที่'), daySel));

    if (fc) {
      const cb = el('input', { type: 'checkbox', style: 'width:auto;margin-right:8px;' });
      cb.checked = active;
      cb.addEventListener('change', () => { active = cb.checked; });
      c.appendChild(el('label', { style: 'display:flex;align-items:center;margin:8px 0;' }, cb, 'เปิดใช้งาน'));
    }

    c.appendChild(el('button', {
      class: 'btn btn-primary btn-block mt-16',
      onclick: async () => {
        const amt = Number(amount);
        if (!isFinite(amt) || amt <= 0) return toast('ใส่จำนวนเงิน', 'error');
        if (!category) return toast('เลือกหมวดหมู่', 'error');
        try {
          if (fc) {
            await api('updateFixedCost', { fcId: fc.fcId, name, type, category, amount: amt, dayOfMonth: Number(day), active });
          } else {
            await api('addFixedCost', { name, type, category, amount: amt, dayOfMonth: Number(day) });
          }
          closeModal(); toast('บันทึกแล้ว', 'success');
          await Promise.all([reloadFixedCosts(), reloadMonth()]); render();
        } catch (e) { toast(e.message, 'error'); }
      }
    }, 'บันทึก'));

    if (fc) {
      c.appendChild(el('button', {
        class: 'btn btn-danger btn-block mt-8',
        onclick: async () => {
          if (!confirm('ลบรายการประจำนี้?')) return;
          try {
            await api('deleteFixedCost', { fcId: fc.fcId });
            closeModal(); toast('ลบแล้ว', 'success');
            await reloadFixedCosts(); render();
          } catch (e) { toast(e.message, 'error'); }
        }
      }, '🗑 ลบ'));
    }
  });
}

function showCategoriesModal() {
  openModal('หมวดหมู่', (c) => {
    function draw() {
      c.innerHTML = '';
      ['expense', 'income'].forEach(type => {
        c.appendChild(el('div', { class: 'sec-head' }, el('h3', {}, type === 'expense' ? 'รายจ่าย' : 'รายรับ')));
        const grid = el('div', { class: 'cat-grid' });
        state.categories.filter(x => x.type === type).forEach(cat => {
          grid.appendChild(el('button', {
            class: 'cat-btn',
            onclick: async () => {
              if (!confirm('ลบหมวด "' + cat.name + '"?\n(รายการเดิมไม่โดนลบ แต่จะไม่เห็นไอคอนหมวดนี้แล้ว)')) return;
              try {
                await api('deleteCategory', { catId: cat.catId });
                state.categories = state.categories.filter(x => x.catId !== cat.catId);
                draw();
              } catch (e) { toast(e.message, 'error'); }
            }
          }, el('div', { class: 'emo' }, cat.emoji), el('div', {}, cat.name), el('div', { class: 'small muted' }, 'ลบ')));
        });
        c.appendChild(grid);
        c.appendChild(el('button', {
          class: 'btn btn-ghost btn-block mt-8',
          onclick: () => showAddCategoryModal(type, draw)
        }, '+ เพิ่มหมวด' + (type === 'expense' ? 'รายจ่าย' : 'รายรับ')));
      });
    }
    draw();
  });
}

function showAddCategoryModal(type, onAdded) {
  openModal('เพิ่มหมวดหมู่', (c) => {
    let emoji = '📦';
    const emojis = ['🍜','🚗','🛒','🏠','💡','📱','🎮','💊','☕','🍺','🍕','👕','💼','🎁','🎓','✈️','⛽','🏥','💇','🎬','📚','🐶','💰','💳','📦','🎯','💅','🌸','🎨','⚽'];
    const emoBox = el('div', { class: 'chip-row', style: 'max-height:160px;overflow-y:auto;' });
    emojis.forEach(e => {
      const ch = el('button', {
        class: 'chip' + (e === emoji ? ' active' : ''),
        style: 'font-size:20px;',
        onclick: () => { emoji = e; [...emoBox.children].forEach(x => x.classList.remove('active')); ch.classList.add('active'); }
      }, e);
      emoBox.appendChild(ch);
    });
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'เลือกไอคอน'), emoBox));

    const nameInp = el('input', { placeholder: 'ชื่อหมวด' });
    c.appendChild(el('div', { class: 'field' }, el('label', {}, 'ชื่อ'), nameInp));

    c.appendChild(el('button', {
      class: 'btn btn-primary btn-block mt-12',
      onclick: async () => {
        const name = nameInp.value.trim();
        if (!name) return toast('ใส่ชื่อ', 'error');
        try {
          const r = await api('addCategory', { name, emoji, type });
          state.categories.push({ catId: r.catId, userId: state.user.userId, name, emoji, type });
          closeModal(); toast('เพิ่มแล้ว', 'success');
          if (onAdded) setTimeout(() => { showCategoriesModal(); }, 250);
        } catch (e) { toast(e.message, 'error'); }
      }
    }, 'เพิ่ม'));
  });
}

function showBudgetModal() {
  openModal('งบประมาณรายเดือน', (c) => {
    c.appendChild(el('div', { class: 'small muted mt-8' }, 'ตั้งงบใช้จ่ายต่อเดือนของแต่ละหมวด (0 = ไม่จำกัด)'));
    state.categories.filter(x => x.type === 'expense').forEach(cat => {
      const b = state.budgets.find(x => x.category === cat.name);
      const inp = el('input', {
        type: 'tel', inputmode: 'decimal',
        placeholder: '0', value: b ? b.amount : ''
      });
      inp.addEventListener('blur', async () => {
        const amt = Number(inp.value) || 0;
        try {
          await api('setBudget', { category: cat.name, amount: amt });
          state.budgets = state.budgets.filter(x => x.category !== cat.name);
          if (amt > 0) state.budgets.push({ userId: state.user.userId, category: cat.name, amount: amt });
        } catch (e) { toast(e.message, 'error'); }
      });
      c.appendChild(el('div', { class: 'row', style: 'margin:8px 0;gap:12px;' },
        el('div', { style: 'font-size:22px;width:28px;' }, cat.emoji),
        el('div', { style: 'flex:1;' }, cat.name),
        el('div', { style: 'width:120px;' }, inp)
      ));
    });
  });
}

function showUserManagement() {
  openModal('จัดการผู้ใช้', async (c) => {
    c.appendChild(el('div', { class: 'center' }, el('div', { class: 'loader' })));
    try {
      const r = await api('listUsers');
      c.innerHTML = '';
      r.users.forEach(u => {
        c.appendChild(el('div', { class: 'row', style: 'padding:12px 0;border-bottom:1px solid var(--border);' },
          el('div', { class: 'user-avatar' }, u.name.slice(0, 1).toUpperCase()),
          el('div', { style: 'flex:1;' },
            el('div', { style: 'font-weight:600;' }, u.name + (u.userId === state.user.userId ? ' (คุณ)' : '')),
            el('div', { class: 'small muted' }, u.isAdmin ? '⭐ Admin' : 'ผู้ใช้')
          ),
          (u.userId !== state.user.userId && !u.isAdmin) ? el('button', {
            class: 'btn btn-sm btn-danger',
            onclick: async () => {
              if (!confirm('ลบผู้ใช้ ' + u.name + '?\n⚠️ ข้อมูลทั้งหมดของคนนี้จะถูกลบ (กู้คืนไม่ได้)')) return;
              try {
                await api('deleteUser', { targetUserId: u.userId });
                toast('ลบแล้ว', 'success');
                closeModal(); setTimeout(() => showUserManagement(), 250);
              } catch (e) { toast(e.message, 'error'); }
            }
          }, 'ลบ') : null
        ));
      });
    } catch (e) {
      c.innerHTML = '';
      c.appendChild(el('div', { class: 'empty' }, 'โหลดไม่สำเร็จ'));
    }
  });
}

async function exportCsvFile() {
  toast('กำลังดาวน์โหลด...');
  try {
    const r = await api('exportCsv');
    const blob = new Blob(['﻿' + r.csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'รายรับรายจ่าย-' + todayISO() + '.csv';
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('ดาวน์โหลดแล้ว', 'success');
  } catch (e) { toast(e.message, 'error'); }
}

/* ==================== INIT ==================== */
async function init() {
  applyTheme();

  // Show loading screen while Firebase signs in
  const app = $('#app');
  app.innerHTML = '<div class="view" style="padding-top:40px;text-align:center;"><div style="font-size:56px;">💰</div><div class="muted mt-16"><div class="loader"></div></div><div class="small muted mt-8">กำลังเชื่อมต่อ...</div></div>';

  if (firebaseConfig.apiKey === 'FIREBASE_CONFIG_HERE') {
    app.innerHTML = '<div class="view" style="padding-top:60px;"><div class="card empty"><div class="emo">⚙️</div><div>ยังไม่ได้ตั้งค่า Firebase</div><div class="small mt-8">แก้ไข firebaseConfig ใน index.html</div></div></div>';
    return;
  }

  try {
    await fbAuth.signInAnonymously();
    await new Promise(res => {
      const unsub = fbAuth.onAuthStateChanged(u => {
        if (u) { unsub(); res(); }
      });
    });
    state.firebaseReady = true;
  } catch (e) {
    app.innerHTML = '<div class="view" style="padding-top:60px;"><div class="card empty"><div class="emo">❌</div><div>เชื่อมต่อ Firebase ไม่ได้</div><div class="small mt-8">' + e.message + '</div><div class="small mt-8">ตรวจสอบ: (1) firebaseConfig ถูกต้อง (2) เปิด Anonymous Auth แล้ว</div></div></div>';
    return;
  }

  if (state.user) {
    await loadAll();
  }
  render();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}
init();
</script>
